name: Publish

on:
  workflow_dispatch:
  push:
   paths-ignore:
     - '.gitignore'
     - 'LICENSE'
     - 'README.md'
     - 'DIFFERENCES_WIKI.md'
     - 'gradle.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Change wrapper permissions
        run: chmod +x ./gradlew
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Build Project
        run: ./gradlew :geyser:shadowJar
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        if: ${{ success() }}
        with:
          name: Boar
          path: geyser/build/libs/boar-geyser.jar
          if-no-files-found: error
      - name: Publish to Modrinth
        if: ${{ success() && github.repository == 'opencollab-incubator/Boar' && github.ref_name == 'master' }}
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew modrinth
